name: Generate & Deploy Content

on:
  workflow_dispatch:
    inputs:
      section:
        description: 'Section to generate (all, guides, blog, showcase, tools, tutorials, compare, profiles)'
        required: false
        default: 'all'
  schedule:
    # Run weekly on Sunday at 2am UTC for maintenance regeneration
    - cron: '0 2 * * 0'
  repository_dispatch:
    types: [regenerate-content]

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      AI_ENABLED: true
    steps:
      - name: Checkout landing site
        uses: actions/checkout@v4
        with:
          repository: is-cool-me/is-pro.dev
          path: is-pro.dev
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download domain database from dash
        continue-on-error: true
        run: |
          mkdir -p dash/data
          curl -fsS -o dash/data/domains.db \
            -H "x-export-key: ${{ secrets.DOMAIN_EXPORT_KEY }}" \
            "https://dash.is-pro.dev/api/domains/export"
          if [ -f dash/data/domains.db ] && [ -s dash/data/domains.db ]; then
            echo "[db] Downloaded domains database ($(stat -c%s dash/data/domains.db) bytes)"
          else
            echo "[db] Failed to download database, will use fallback"
            sqlite3 dash/data/domains.db \
              "CREATE TABLE IF NOT EXISTS domains (id INTEGER PRIMARY KEY AUTOINCREMENT, subdomain TEXT NOT NULL, zone TEXT NOT NULL, owner_username TEXT, created_at TEXT, updated_at TEXT);" \
              "CREATE TABLE IF NOT EXISTS dns_records (id INTEGER PRIMARY KEY AUTOINCREMENT, domain_id INTEGER);"
            echo "[db] Created empty database as fallback"
          fi

      - name: Download showcase data from dash
        continue-on-error: true
        run: |
          mkdir -p dash/data
          curl -fsS -o dash/data/showcase.json \
            -H "x-export-key: ${{ secrets.DOMAIN_EXPORT_KEY }}" \
            "https://dash.is-pro.dev/api/showcase/export"
          if [ -f dash/data/showcase.json ] && [ -s dash/data/showcase.json ]; then
            echo "[showcase] Downloaded showcase data ($(stat -c%s dash/data/showcase.json) bytes)"
          else
            echo "[showcase] Failed to download showcase data"
            echo '[]' > dash/data/showcase.json
          fi

      - name: Install generator dependencies
        run: |
          cd is-pro.dev/generator
          npm install --prefer-offline 2>/dev/null || npm install

      - name: Generate content
        run: |
          cd is-pro.dev/generator
          SECTION=${{ github.event.inputs.section || 'all' }}
          if [ "$SECTION" = "all" ]; then
            node generate.js --all
          else
            node generate.js --type=$SECTION
          fi
        env:
          SITE_ROOT: ${{ github.workspace }}/is-pro.dev
          DB_PATH: ${{ github.workspace }}/dash/data/domains.db
          SHOWCASE_PATH: ${{ github.workspace }}/dash/data/showcase.json
          GH_PAT: ${{ secrets.GH_PAT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Install Playwright for screenshots
        run: |
          cd is-pro.dev/generator
          npm install playwright 2>/dev/null
          npx playwright install chromium 2>/dev/null

      - name: Take showcase screenshots
        continue-on-error: true
        run: |
          cd is-pro.dev/generator
          node scripts/screenshot.js
        env:
          SITE_ROOT: ${{ github.workspace }}/is-pro.dev
          SHOWCASE_PATH: ${{ github.workspace }}/dash/data/showcase.json

      - name: Commit and push changes
        run: |
          cd is-pro.dev
          git config user.name "is-cool-me Bot"
          git config user.email "bot@is-cool-me"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to push"
          else
            git commit -m "chore: auto-regenerate content [skip ci]"
            git fetch origin main
            git rebase origin/main
            git push origin main
          fi