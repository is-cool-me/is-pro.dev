name: Generate & Deploy Content

on:
  workflow_dispatch:
    inputs:
      section:
        description: 'Section to generate (all, guides, blog, showcase, tools, tutorials, compare, profiles)'
        required: false
        default: 'all'
  schedule:
    # Run weekly on Sunday at 2am UTC for maintenance regeneration
    - cron: '0 2 * * 0'
  repository_dispatch:
    types: [regenerate-content]

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      AI_ENABLED: true
      OLLAMA_HOST: http://localhost:11434
    steps:
      - name: Checkout landing site
        uses: actions/checkout@v4
        with:
          repository: is-cool-me/is-pro.dev
          path: is-pro.dev
          token: ${{ secrets.GH_PAT }}

      - name: Checkout dash (for DB access)
        uses: actions/checkout@v4
        with:
          repository: is-cool-me/dash
          path: dash
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create database if missing
        run: |
          mkdir -p dash/data
          if [ ! -f dash/data/domains.db ]; then
            sqlite3 dash/data/domains.db <<'SQL'
              CREATE TABLE IF NOT EXISTS domains (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                subdomain TEXT NOT NULL,
                zone TEXT NOT NULL,
                owner_username TEXT,
                owner_email TEXT,
                created_at TEXT,
                updated_at TEXT
              );
              CREATE TABLE IF NOT EXISTS dns_records (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                domain_id INTEGER,
                type TEXT,
                name TEXT,
                value TEXT
              );
SQL
            echo "[db] Created empty database at dash/data/domains.db"
          fi

      - name: Install generator dependencies
        run: |
          cd is-pro.dev/generator
          npm install --prefer-offline 2>/dev/null || npm install

      - name: Install and start Ollama
        continue-on-error: true
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 15); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "[ai] Ollama server started"
              break
            fi
            sleep 2
          done
          ollama pull llama3.2:latest 2>&1 | tail -3

      - name: Check Ollama availability
        run: |
          if curl -s --max-time 5 http://localhost:11434/api/tags > /dev/null 2>&1; then
            echo "AI_ENABLED=true" >> "$GITHUB_ENV"
            echo "[ai] Ollama reachable"
          else
            echo "AI_ENABLED=false" >> "$GITHUB_ENV"
            echo "[ai] Ollama unreachable, using fallback"
          fi

      - name: Generate content
        run: |
          cd is-pro.dev/generator
          SECTION=${{ github.event.inputs.section || 'all' }}
          if [ "$SECTION" = "all" ]; then
            node generate.js --all
          else
            node generate.js --type=$SECTION
          fi
        env:
          SITE_ROOT: ${{ github.workspace }}/is-pro.dev
          DB_PATH: ${{ github.workspace }}/dash/data/domains.db
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Commit and push changes
        run: |
          cd is-pro.dev
          git config user.name "is-cool-me Bot"
          git config user.email "bot@is-cool-me"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to push"
          else
            git commit -m "chore: auto-regenerate content [skip ci]"
            git push origin main
          fi